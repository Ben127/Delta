name: Build Delta (Xcode15 | Swift5.9 | iOS14 | Unsigned)
run-name: Delta Auto Build Unsigned IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      SWIFT_VERSION: 5.9
      SWIFT_USE_SWIFTDRIVER: NO
      IPHONEOS_DEPLOYMENT_TARGET: 14.0

    steps:
      - name: Checkout source + LFS + submodules
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Fix & pull Git LFS assets
        run: |
          git lfs install
          git lfs prune
          git lfs fetch --all
          git lfs checkout

      - name: Pin Xcode 15.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.0"

      # 第一步：编译 Systems 子工程（官方要求先编译Systems）
      - name: Build Systems workspace
        run: |
          cd Systems
          xcodebuild build \
            -workspace Systems.xcworkspace \
            -scheme Systems \
            -configuration Release \
            -arch arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            SWIFT_VERSION=5.9 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 第二步：归档 Delta 主项目
      - name: Archive Delta (Unsigned xcarchive)
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -archivePath ${RUNNER_TEMP}/Delta.xcarchive \
            -destination generic/platform=iOS \
            -arch arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            SWIFT_VERSION=5.9 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # 无签名导出配置
      - name: Create ExportOptions.plist
        run: |
          cat > ${RUNNER_TEMP}/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>none</string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>compileBitcode</key>
            <false/>
            <key>minimumSystemVersion</key>
            <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${RUNNER_TEMP}/Delta.xcarchive \
            -exportPath ${RUNNER_TEMP}/Output \
            -exportOptionsPlist ${RUNNER_TEMP}/ExportOptions.plist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-iOS14-Unsigned-IPA
          path: |
            ${{ runner.temp }}/Output/*.ipa
            ${{ runner.temp }}/Delta.xcarchive
          retention-days: 30
