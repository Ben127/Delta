name: Build Delta (Xcode15 / Swift5.9 / iOS14, Unsigned IPA)
run-name: Build unsigned Delta ${{ github.sha }}
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      # 强制 Swift 5.9 编译模式，规避 SwiftDriver 异常
      SWIFT_VERSION: 5.9
      SWIFT_USE_SWIFTDRIVER: NO
      IPHONEOS_DEPLOYMENT_TARGET: 14.0

    steps:
      - name: Checkout full source + LFS + submodules
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Repair Git LFS
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout

      # 锁定 Xcode 15（满足项目最低要求 Xcode15）
      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.0"

      # 编译 Systems 子工程（必须带 -workspace 杜绝 Package.swift 报错）
      - name: Build Systems workspace (iOS14 arm64 no sign)
        run: |
          pwd
          cd Systems
          pwd
          ls -la
          xcodebuild build \
            -workspace Systems.xcworkspace \
            -scheme Systems \
            -configuration Release \
            -arch arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            SWIFT_VERSION=5.9 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 归档主项目 Delta，最低部署 iOS14、Swift5.9、仅arm64、无签名
      - name: Archive Delta (Unsigned xcarchive)
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Release \
            -archivePath ${RUNNER_TEMP}/Delta-Unsigned.xcarchive \
            -destination generic/platform=iOS \
            -arch arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            SWIFT_VERSION=5.9 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # 导出配置：无证书、不签名
      - name: Generate unsigned ExportOptions.plist
        run: |
          cat > ${RUNNER_TEMP}/ExportOptionsUnsigned.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>none</string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>compileBitcode</key>
            <false/>
            <key>minimumSystemVersion</key>
            <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Export Unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${RUNNER_TEMP}/Delta-Unsigned.xcarchive \
            -exportPath ${RUNNER_TEMP}/Output \
            -exportOptionsPlist ${RUNNER_TEMP}/ExportOptionsUnsigned.plist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-iOS14-Xcode15-Unsigned-IPA
          path: |
            ${{ runner.temp }}/Output/*.ipa
            ${{ runner.temp }}/Delta-Unsigned.xcarchive
          retention-days: 30
